<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h4>所有訂單全覽</h4>
    <div>
        <button id="importGoogleForm" class="btn btn-outline-success btn-sm me-2">從 Google 表單匯入</button>
        <button id="refreshOrders" class="btn btn-outline-secondary btn-sm">重新整理</button>
    </div>
</div>

<div id="orderSummary" class="mb-3 d-flex align-items-center flex-wrap" style="gap:8px;">
    <label>出貨日期：</label>
    <select id="filterShippingDate" class="form-select form-select-sm" style="width:auto;">
        <option value="">全部</option>
    </select>
    <label class="ms-2">到貨日期：</label>
    <select id="filterArrivalDate" class="form-select form-select-sm" style="width:auto;">
        <option value="">全部</option>
    </select>
    <label class="ms-2">匯出狀態：</label>
    <select id="filterExported" class="form-select form-select-sm" style="width:auto;">
        <option value="">全部</option>
        <option value="yes">已匯出</option>
        <option value="no">未匯出</option>
    </select>
    <span class="badge bg-secondary ms-2" id="totalCount">載入中...</span>
</div>

<div class="table-responsive">
    <table class="table table-striped table-sm" id="allOrdersTable">
        <thead>
            <tr>
                <th>#</th>
                <th>出貨日期</th>
                <th>收件人</th>
                <th>地址</th>
                <th>電話</th>
                <th>數量(箱)</th>
                <th>到貨日期</th>
                <th>時段</th>
                <th>付款方式</th>
                <th>配送方式</th>
                <th>備註</th>
                <th>來源</th>
                <th>已收款</th>
                <th>匯出狀態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="orderTableBody">
        </tbody>
    </table>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">編輯訂單</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="mb-2"><label>收件人</label><input type="text" class="form-control" id="edit-name"></div>
        <div class="mb-2"><label>地址</label><input type="text" class="form-control" id="edit-address"></div>
        <div class="mb-2"><label>電話</label><input type="text" class="form-control" id="edit-phone"></div>
        <div class="mb-2"><label>手機</label><input type="text" class="form-control" id="edit-mPhone"></div>
        <div class="row mb-2">
            <div class="col"><label>數量(箱)</label><input type="number" class="form-control" id="edit-numbers"></div>
            <div class="col"><label>出貨日期</label><input type="text" class="form-control" id="edit-shippingDate"></div>
        </div>
        <div class="row mb-2">
            <div class="col"><label>到貨日期</label><input type="text" class="form-control" id="edit-arrivalDate"></div>
            <div class="col"><label>時段</label>
                <select class="form-control" id="edit-arrivalTime">
                    <option value="上午">上午</option>
                    <option value="下午">下午</option>
                    <option value="不指定">不指定</option>
                </select>
            </div>
        </div>
        <div class="row mb-2">
            <div class="col"><label>付款方式</label>
                <select class="form-control" id="edit-paymentMethod">
                    <option value="轉帳">轉帳</option>
                    <option value="貨到付款">貨到付款</option>
                </select>
            </div>
            <div class="col"><label>配送方式</label>
                <select class="form-control" id="edit-deliveryType">
                    <option value="宅配">宅配</option>
                    <option value="自取">自取</option>
                </select>
            </div>
        </div>
        <div class="mb-2"><label>備註</label><input type="text" class="form-control" id="edit-userComment"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" id="saveEdit">儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- New Data Notification Modal -->
<div class="modal fade" id="newDataModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Google 表單通知</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="newDataMsg"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">稍後再說</button>
        <button type="button" class="btn btn-success btn-sm" id="openImportFromNotify">開啟匯入預覽</button>
      </div>
    </div>
  </div>
</div>

<!-- Import Preview Modal -->
<div class="modal fade" id="importPreviewModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Google 表單匯入預覽</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="importPreviewMsg"></p>

        <h6>新訂單 <small class="text-muted">（勾選要匯入的）</small></h6>
        <div class="table-responsive" style="max-height:300px;overflow-y:auto;">
          <table class="table table-striped table-sm">
            <thead>
              <tr><th><input type="checkbox" id="checkAllNew" checked></th><th>收件人</th><th>地址</th><th>電話</th><th>數量</th><th>到貨日期</th><th>出貨日期</th><th>時段</th><th>付款方式</th></tr>
            </thead>
            <tbody id="importNewBody"></tbody>
          </table>
        </div>

        <div id="rejectedSection" style="display:none;">
          <hr>
          <h6>曾排除的訂單 <small class="text-muted">（勾選可重新匯入）</small></h6>
          <div class="table-responsive" style="max-height:200px;overflow-y:auto;">
            <table class="table table-striped table-sm table-warning">
              <thead>
                <tr><th><input type="checkbox" id="checkAllRejected"></th><th>收件人</th><th>地址</th><th>電話</th><th>數量</th><th>到貨日期</th><th>出貨日期</th><th>時段</th><th>付款方式</th></tr>
              </thead>
              <tbody id="importRejectedBody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-success" id="confirmImport">確認匯入勾選項目</button>
      </div>
    </div>
  </div>
</div>

<script>
window.addEventListener("load", function() {

var _allOrders = [];

function loadAllOrders() {
    $("#totalCount").text("載入中...");
    $.ajax({
        url: "api_allOrders",
        type: "get",
        dataType: "json",
        success: function(data) {
            if (!data.isSuccess) {
                $("#totalCount").text("載入失敗：" + (data.msg || "unknown"));
                return;
            }
            _allOrders = data.orders;
            buildDateFilter();
            renderTable();
        },
        error: function(xhr) {
            $("#totalCount").text("載入失敗 (" + xhr.status + ")");
        }
    });
}

function buildDateFilter() {
    var arrDates = {}, shipDates = {};
    for (var i = 0; i < _allOrders.length; i++) {
        var a = _allOrders[i].arrivalDate || "";
        var s = _allOrders[i].shippingDate || "";
        if (a) arrDates[a] = true;
        if (s) shipDates[s] = true;
    }
    fillSelect("#filterArrivalDate", arrDates);
    fillSelect("#filterShippingDate", shipDates);
}

function fillSelect(sel, dates) {
    var $sel = $(sel);
    var current = $sel.val();
    $sel.find("option:not(:first)").remove();
    var sorted = Object.keys(dates).sort();
    for (var j = 0; j < sorted.length; j++) {
        $sel.append('<option value="' + sorted[j] + '">' + sorted[j] + '</option>');
    }
    if (current) $sel.val(current);
}

function getFilteredOrders() {
    var arrFilter = $("#filterArrivalDate").val();
    var shipFilter = $("#filterShippingDate").val();
    var expFilter = $("#filterExported").val();
    return _allOrders.filter(function(o) {
        if (arrFilter && o.arrivalDate !== arrFilter) return false;
        if (shipFilter && o.shippingDate !== shipFilter) return false;
        if (expFilter === "yes" && !o.exported) return false;
        if (expFilter === "no" && o.exported) return false;
        return true;
    });
}

function renderTable() {
    var filtered = getFilteredOrders();
    $("#totalCount").text("共 " + filtered.length + " 筆訂單" + (filtered.length < _allOrders.length ? "（篩選中，全部 " + _allOrders.length + " 筆）" : ""));
    var tbody = $("#orderTableBody");
    tbody.empty();
    for (var i = 0; i < filtered.length; i++) {
        var o = filtered[i];
        var realIdx = _allOrders.indexOf(o);
        var row = "<tr>" +
            "<td>" + (i + 1) + "</td>" +
            "<td>" + (o.shippingDate || "") + "</td>" +
            "<td>" + (o.name || "") + "</td>" +
            "<td>" + (o.address || "") + "</td>" +
            "<td>" + (o.mPhone || o.phone || "") + "</td>" +
            "<td>" + (o.numbers || "") + "</td>" +
            "<td>" + (o.arrivalDate || "") + "</td>" +
            "<td>" + (o.arrivalTime || "") + "</td>" +
            "<td>" + (o.paymentMethod || "") + "</td>" +
            "<td>" + (o.deliveryType || "宅配") + "</td>" +
            "<td>" + (o.userComment || "") + "</td>" +
            "<td>" + (o.source || "") + "</td>" +
            '<td><input type="checkbox" class="form-check-input chk-paid" data-idx="' + realIdx + '"' + (o.paid ? ' checked' : '') + '></td>' +
            "<td>" + (o.exported ? '<span style="color:green">✓ ' + (o.exportedAt || '已匯出') + '</span>' : '') + "</td>" +
            '<td>' +
                '<button class="btn btn-sm btn-outline-primary me-1 btn-edit" data-idx="' + realIdx + '">編輯</button>' +
                '<button class="btn btn-sm btn-outline-danger btn-delete" data-idx="' + realIdx + '">刪除</button>' +
            '</td>' +
            "</tr>";
        tbody.append(row);
    }
}

// Edit
$(document).on("click", ".btn-edit", function() {
    var idx = $(this).data("idx");
    var o = _allOrders[idx];
    $("#edit-id").val(o.id);
    $("#edit-name").val(o.name);
    $("#edit-address").val(o.address);
    $("#edit-phone").val(o.phone);
    $("#edit-mPhone").val(o.mPhone);
    $("#edit-numbers").val(o.numbers);
    $("#edit-shippingDate").val(o.shippingDate);
    $("#edit-arrivalDate").val(o.arrivalDate);
    $("#edit-arrivalTime").val(o.arrivalTime);
    $("#edit-paymentMethod").val(o.paymentMethod);
    $("#edit-deliveryType").val(o.deliveryType || "宅配");
    $("#edit-userComment").val(o.userComment);
    var modal = new bootstrap.Modal(document.getElementById("editModal"));
    modal.show();
});

$("#saveEdit").on("click", function() {
    var payload = {
        id: $("#edit-id").val(),
        name: $("#edit-name").val(),
        address: $("#edit-address").val(),
        phone: $("#edit-phone").val(),
        mPhone: $("#edit-mPhone").val(),
        numbers: parseInt($("#edit-numbers").val()) || 0,
        shippingDate: $("#edit-shippingDate").val(),
        arrivalDate: $("#edit-arrivalDate").val(),
        arrivalTime: $("#edit-arrivalTime").val(),
        paymentMethod: $("#edit-paymentMethod").val(),
        deliveryType: $("#edit-deliveryType").val(),
        userComment: $("#edit-userComment").val()
    };
    $.ajax({
        url: "api_updateOrder",
        type: "post",
        contentType: "application/json",
        data: JSON.stringify(payload),
        dataType: "json",
        success: function(data) {
            if (data.isSuccess) {
                bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
                loadAllOrders();
            } else {
                alert("更新失敗：" + data.msg);
            }
        },
        error: function() { alert("更新失敗"); }
    });
});

// Delete
$(document).on("click", ".btn-delete", function() {
    var idx = $(this).data("idx");
    var o = _allOrders[idx];
    if (!confirm("確定刪除「" + o.name + "」的訂單？")) return;
    $.ajax({
        url: "api_deleteOrder",
        type: "post",
        contentType: "application/json",
        data: JSON.stringify({ id: o.id }),
        dataType: "json",
        success: function(data) {
            if (data.isSuccess) {
                loadAllOrders();
            } else {
                alert("刪除失敗：" + data.msg);
            }
        },
        error: function() { alert("刪除失敗"); }
    });
});

// Toggle paid
$(document).on("change", ".chk-paid", function() {
    var idx = $(this).data("idx");
    var o = _allOrders[idx];
    var paid = $(this).is(":checked");
    $.ajax({
        url: "api_togglePaid",
        type: "post",
        contentType: "application/json",
        data: JSON.stringify({ id: o.id, paid: paid }),
        dataType: "json",
        success: function(data) {
            if (!data.isSuccess) alert("更新失敗：" + data.msg);
        },
        error: function() { alert("更新失敗"); }
    });
});

function renderImportRow(o, checked) {
    return "<tr>" +
        '<td><input type="checkbox" class="import-chk" data-key="' + o.key + '"' + (checked ? ' checked' : '') + '></td>' +
        "<td>" + (o.name || "") + "</td>" +
        "<td>" + (o.address || "") + "</td>" +
        "<td>" + (o.mPhone || o.phone || "") + "</td>" +
        "<td>" + (o.numbers || "") + "</td>" +
        "<td>" + (o.arrivalDate || "") + "</td>" +
        "<td>" + (o.shippingDate || "") + "</td>" +
        "<td>" + (o.arrivalTime || "") + "</td>" +
        "<td>" + (o.paymentMethod || "") + "</td>" +
        "</tr>";
}

// Import: Step 1 - Preview
$("#importGoogleForm").on("click", function() {
    var btn = $(this);
    btn.prop("disabled", true).text("讀取中...");
    $.ajax({
        url: "api_previewGoogleFormImport",
        type: "post",
        contentType: "application/json",
        data: "{}",
        dataType: "json",
        success: function(data) {
            btn.prop("disabled", false).text("從 Google 表單匯入");
            if (!data.isSuccess) { alert(data.msg); return; }
            if (data.newOrders.length === 0 && data.rejectedOrders.length === 0) {
                alert("沒有新訂單可匯入（全部已存在）"); return;
            }
            showImportPreview(data);
        },
        error: function() {
            btn.prop("disabled", false).text("從 Google 表單匯入");
            alert("讀取失敗");
        }
    });
});

// Check all toggles
$("#checkAllNew").on("change", function() {
    $("#importNewBody .import-chk").prop("checked", $(this).is(":checked"));
});
$("#checkAllRejected").on("change", function() {
    $("#importRejectedBody .import-chk").prop("checked", $(this).is(":checked"));
});

// Import: Step 2 - Confirm
$("#confirmImport").on("click", function() {
    var importKeys = [];
    var rejectKeys = [];
    $(".import-chk").each(function() {
        if ($(this).is(":checked")) {
            importKeys.push($(this).data("key"));
        } else {
            rejectKeys.push($(this).data("key"));
        }
    });

    var btn = $(this);
    btn.prop("disabled", true).text("匯入中...");
    $.ajax({
        url: "api_importFromGoogleForm",
        type: "post",
        contentType: "application/json",
        data: JSON.stringify({ importKeys: importKeys, rejectKeys: rejectKeys }),
        dataType: "json",
        success: function(data) {
            btn.prop("disabled", false).text("確認匯入勾選項目");
            bootstrap.Modal.getInstance(document.getElementById("importPreviewModal")).hide();
            alert(data.msg);
            if (data.isSuccess) loadAllOrders();
        },
        error: function() {
            btn.prop("disabled", false).text("確認匯入勾選項目");
            alert("匯入失敗");
        }
    });
});

// Auto-check Google Form for new data on page load
var _cachedPreviewData = null;

function checkNewGoogleFormData() {
    $.ajax({
        url: "api_previewGoogleFormImport",
        type: "post",
        contentType: "application/json",
        data: "{}",
        dataType: "json",
        success: function(data) {
            if (!data.isSuccess) return;
            if (data.newOrders.length === 0) return;
            _cachedPreviewData = data;
            $("#newDataMsg").text("Google 表單有 " + data.newOrders.length + " 筆新訂單尚未匯入。");
            var modal = new bootstrap.Modal(document.getElementById("newDataModal"));
            modal.show();
        }
    });
}

$("#openImportFromNotify").on("click", function() {
    var el = document.getElementById("newDataModal");
    var data = _cachedPreviewData;
    if (!data) return;
    _cachedPreviewData = null;
    el.addEventListener("hidden.bs.modal", function handler() {
        el.removeEventListener("hidden.bs.modal", handler);
        showImportPreview(data);
    });
    bootstrap.Modal.getInstance(el).hide();
});

function showImportPreview(data) {
    $("#importPreviewMsg").text(data.msg);
    var newBody = $("#importNewBody").empty();
    for (var i = 0; i < data.newOrders.length; i++) {
        newBody.append(renderImportRow(data.newOrders[i], true));
    }
    $("#checkAllNew").prop("checked", true);
    var rejBody = $("#importRejectedBody").empty();
    if (data.rejectedOrders.length > 0) {
        for (var j = 0; j < data.rejectedOrders.length; j++) {
            rejBody.append(renderImportRow(data.rejectedOrders[j], false));
        }
        $("#rejectedSection").show();
        $("#checkAllRejected").prop("checked", false);
    } else {
        $("#rejectedSection").hide();
    }
    var modal = new bootstrap.Modal(document.getElementById("importPreviewModal"));
    modal.show();
}

loadAllOrders();
checkNewGoogleFormData();
$("#refreshOrders").on("click", loadAllOrders);
$("#filterArrivalDate").on("change", renderTable);
$("#filterShippingDate").on("change", renderTable);
$("#filterExported").on("change", renderTable);

}); // end window.addEventListener
</script>
